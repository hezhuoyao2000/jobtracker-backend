spring:
  application:
    name: myfirstspringboot
  datasource:
    url: jdbc:postgresql://localhost:2015/mysite_dev
    username: postgres
    password: hzythebest1
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none  # 禁用 schema 验证，数据库表已手动创建
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# SpringDoc OpenAPI 配置
springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    operationsSorter: method
    tagsSorter: alpha
    defaultModelsExpandDepth: 1
  api-docs:
    path: /v3/api-docs

# 应用配置
app:
  # 启动时自动打开浏览器（true=启用，false=禁用）
  auto-open-browser: true
  # Swagger UI 路径
  swagger-path: /swagger-ui/index.html
