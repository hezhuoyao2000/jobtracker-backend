# IoT 模块配置
iot:
  modbus:
    host: localhost
    port: 502
    slave-id: 1
    poll-interval-ms: 1000
    enabled: false  # 默认关闭，启用时改为true

  mqtt:
    broker: tcp://localhost:1883
    client-id: java-gateway-001
    topic: devices/data
    qos: 1
    connection-timeout: 10
    keep-alive-interval: 60

  influxdb:
    url: http://localhost:8086
    token: my-super-secret-token
    org: iot-demo
    bucket: device-metrics

  redis:
    key-prefix: "device:latest:"
    ttl-seconds: 30

# Spring 配置
spring:
  application:
    name: myfirstspringboot
  datasource:
    url: jdbc:postgresql://localhost:${DB_PORT:2015}/${DB_NAME:mysite_dev}
    username: ${DB_USER:hezhuoyao}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  # Kafka 配置
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: iot-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.example.myfirstspringboot.Entity
  type-handlers-package: com.example.myfirstspringboot.config
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deletedAt
      logic-delete-value: "NOW()"
      logic-not-delete-value: "NULL"

# SpringDoc OpenAPI 配置
springdoc:
  swagger-ui:
    path: /swagger-ui/index.html
    operationsSorter: method
    tagsSorter: alpha
    defaultModelsExpandDepth: 1
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: "health,info"  # 只暴露健康和信息端点以节约性能 [6]
        # if: "*"              # 或者暴露所有 (开发环境慎用，生产环境不推荐)
  endpoint:
    health:
      probes:
        enabled: true         # 开启主动探针支持 [7]
      show-details: always    # 输出详细信息方便调试（生产可改为 never）

# 应用配置
app:
  # 启动时自动打开浏览器（true=启用，false=禁用）
  auto-open-browser: true
  # Swagger UI 路径
  swagger-path: /swagger-ui/index.html

