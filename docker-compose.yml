  version: '3.8'
  services:
    postgres:
      image: postgres:16  # 指定版本
      container_name: myfirstspringboot
      restart: unless-stopped
      environment:
        POSTGRES_DB: mysite_dev
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: hzythebest1
      ports:
        - "2015:5432"
      volumes:
        - ./postgres_data:/var/lib/postgresql/data # 数据持久化到本地文件夹
#        - ./backup:/docker-entrypoint-initdb.d # 数据库初始化脚本目录，自动恢复备份
