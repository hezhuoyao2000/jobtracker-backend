version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: myfirstspringboot
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-mysite_dev}
      POSTGRES_USER: ${DB_USER:-mysite_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      CORS_ALLOWED_ORIGIN_1: ${CORS_ALLOWED_ORIGIN_1:http://localhost:3000}
      CORS_ALLOWED_ORIGIN_2: ${CORS_ALLOWED_ORIGIN_2:https://www.hezhuoyao.top}
      CORS_ALLOWED_ORIGIN_3: ${CORS_ALLOWED_ORIGIN_3:https://hezhuoyao.top}
    ports:
      - "${DB_PORT:-2015}:5432"
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro