version: '3.8'
services:
  postgres:
    env_file:
      - .env
    image: postgres:16
    container_name: myfirstspringboot
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-mysite_dev}
      POSTGRES_USER: ${DB_USER:-mysite_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "${DB_PORT:-2015}:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro